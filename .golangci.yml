run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - gosec
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  errcheck:
    # Production code is checked for unhandled errors. Test files are excluded
    # below because helpers and fixtures often ignore returns for brevity.

  gosec:
    # Disable noisy rules that are false positives for this codebase:
    # - G101: hardcoded credentials (triggers on constant/field names, not values)
    # - G104: unhandled errors (duplicated by errcheck, which is already enabled)
    # - G204: subprocess with variable (commands are constructed from trusted config)
    # - G301/G302/G306: directory/file permissions (intentional defaults)
    # - G304: file path constructed from variable (paths come from validated inputs)
    # G115 (integer overflow) and G109 (integer conversion) are kept.
    excludes:
      - G101
      - G104
      - G204
      - G301
      - G302
      - G304
      - G306

  revive:
    # Keep only rules that catch bugs or clearly incorrect code.
    # Style-only rules (exported comments, var naming, unused params, etc.)
    # are excluded to match the "severity only error, no style-only" initial gate.
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code
      - name: redefines-builtin-id

severity:
  default: error

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test helpers and fixtures frequently ignore errors for brevity.
    # Non-test code is still checked by errcheck.
    - path: _test\.go
      linters:
        - errcheck

