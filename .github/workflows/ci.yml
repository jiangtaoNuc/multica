name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- #
  # Path filtering: detect which areas changed so unrelated jobs     #
  # can be skipped (e.g. a frontend-only patch no longer runs        #
  # backend jobs). The `all` summary job stays green when jobs are   #
  # skipped, making it the single required check for branch          #
  # protection.                                                      #
  # ---------------------------------------------------------------- #
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      installer: ${{ steps.filter.outputs.installer }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'apps/**'
              - 'packages/**'
            backend:
              - 'server/**'
            e2e:
              - 'e2e/**'
              - 'playwright.config.ts'
            installer:
              - 'scripts/install.sh'
              - 'scripts/install.ps1'
              - 'scripts/install.test.sh'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'

  # ---------------------------------------------------------------- #
  # Frontend: build, typecheck, lint, test                           #
  # ---------------------------------------------------------------- #
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Test self-host env derivation
        run: bash scripts/selfhost-config.test.sh

      - name: Verify reserved-slugs.ts is up to date
        # Re-runs the generator and fails on any drift from the
        # checked-in TypeScript output. The Go side embeds the JSON
        # source directly, so a passing diff here proves both sides
        # share one source of truth.
        run: |
          pnpm generate:reserved-slugs
          git diff --exit-code -- packages/core/paths/reserved-slugs.ts

      - name: Build, type check, lint, and test
        # Mobile lives in a parallel mobile-verify workflow (path-filtered
        # to apps/mobile/** + packages/core/types/**) so it doesn't add
        # ~50s of expo-lint + tsc to every web/desktop PR. Keep this
        # filter in sync with the root package.json scripts, which also
        # exclude @multica/mobile.
        run: pnpm exec turbo build typecheck lint test --filter='!@multica/docs' --filter='!@multica/mobile'

      - name: Report duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          DURATION=$((END - START))
          echo "::notice::frontend duration: ${DURATION}s"
          echo "⏱️ CI job duration: ${DURATION}s"

  # ---------------------------------------------------------------- #
  # Backend lint: compile check (golangci-lint will be added here    #
  # by LOO-344, govulncheck/tidy-check by LOO-345)                   #
  # ---------------------------------------------------------------- #
  backend-lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Backend setup
        id: setup
        uses: ./.github/actions/backend-setup

      - name: Build
        run: cd server && go build ./...

      - name: Report duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.setup.outputs.start-time }}
          DURATION=$((END - START))
          echo "::notice::backend-lint duration: ${DURATION}s"
          echo "⏱️ CI job duration: ${DURATION}s"

  # ---------------------------------------------------------------- #
  # Backend test: unit + integration tests with Postgres + Redis     #
  # ---------------------------------------------------------------- #
  backend-test:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: multica
          POSTGRES_USER: multica
          POSTGRES_PASSWORD: multica
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U multica -d multica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://multica:multica@localhost:5432/multica?sslmode=disable
      # Wires up the RedisLocalSkill*_test.go suite. Distinct from REDIS_URL
      # (which would flip the server binary itself onto the Redis-backed
      # realtime relay + request stores); the tests talk to this Redis
      # directly so they run alongside the Postgres-backed suite.
      REDIS_TEST_URL: redis://localhost:6379/1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Backend setup
        id: setup
        uses: ./.github/actions/backend-setup

      - name: Run migrations
        run: cd server && go run ./cmd/migrate up

      - name: Test
        run: cd server && go test -race ./...

      - name: Report duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.setup.outputs.start-time }}
          DURATION=$((END - START))
          echo "::notice::backend-test duration: ${DURATION}s"
          echo "⏱️ CI job duration: ${DURATION}s"

  # ---------------------------------------------------------------- #
  # Backend contract: verify DB schema / migration contract          #
  # (migrate idempotency + sqlc drift + migrate roundtrip;           #
  #  OpenAPI contract drift by LOO-349, golden snapshots by LOO-350) #
  # ---------------------------------------------------------------- #
  backend-contract:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: multica
          POSTGRES_USER: multica
          POSTGRES_PASSWORD: multica
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U multica -d multica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://multica:multica@localhost:5432/multica?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Backend setup
        id: setup
        uses: ./.github/actions/backend-setup

      - name: Run migrations (up)
        run: cd server && go run ./cmd/migrate up

      - name: Verify migrations are idempotent
        # Re-running `migrate up` after a successful run should be a
        # no-op. A non-idempotent migration file (e.g. one that CREATEs
        # without IF NOT EXISTS) will fail here.
        run: cd server && go run ./cmd/migrate up

      - name: SQLC drift
        # Install sqlc, regenerate, and fail if generated code diverges from
        # what is checked in. Ensures the repo's single source of truth
        # (migrations/ → pkg/db/generated/) is always in sync.
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          cd server && sqlc generate
          git diff --exit-code -- server/

      - name: Migrate roundtrip
        # Smoke-tests the last 10 migrations for down→up idempotency.
        # Fails fast if any .down.sql is missing or the round-trip breaks.
        run: bash scripts/migrate-roundtrip.sh

      - name: Report duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.setup.outputs.start-time }}
          DURATION=$((END - START))
          echo "::notice::backend-contract duration: ${DURATION}s"
          echo "⏱️ CI job duration: ${DURATION}s"

  # ---------------------------------------------------------------- #
  # Installer: stub-driven shell tests on Linux + macOS              #
  # ---------------------------------------------------------------- #
  installer:
    needs: changes
    if: needs.changes.outputs.installer == 'true' || needs.changes.outputs.workflows == 'true'
    # Stub-driven shell tests for scripts/install.sh. Kept off the heavy
    # backend job so installer regressions surface independently, and
    # exercised on macOS too because the installer targets macOS/Homebrew
    # and `tar` / `sed` / `mktemp` differ between BSD and GNU userlands.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Test shell installers
        run: bash scripts/install.test.sh

      - name: Report duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          DURATION=$((END - START))
          echo "::notice::installer (${{ matrix.os }}) duration: ${DURATION}s"
          echo "⏱️ CI job duration: ${DURATION}s"

  # ---------------------------------------------------------------- #
  # E2E: Playwright end-to-end tests with flaky retry                #
  # ---------------------------------------------------------------- #
  e2e:
    needs: changes
    if: |
      needs.changes.outputs.e2e == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: multica
          POSTGRES_USER: multica
          POSTGRES_PASSWORD: multica
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U multica -d multica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://multica:multica@localhost:5432/multica?sslmode=disable
      REDIS_TEST_URL: redis://localhost:6379/1
      JWT_SECRET: ci-e2e-test-secret
      PORT: "8080"
      FRONTEND_PORT: "3000"
      FRONTEND_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      # Deterministic verification code so E2E can log in without email
      MULTICA_DEV_VERIFICATION_CODE: "888888"
    steps:
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: server/go.sum

      - name: Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run migrations
        run: cd server && go run ./cmd/migrate up

      - name: Start backend
        run: |
          cd server && nohup go run ./cmd/server > /tmp/multica-e2e-backend.log 2>&1 &
          echo $! > /tmp/multica-e2e-backend.pid

      - name: Start frontend
        run: |
          nohup pnpm dev:web > /tmp/multica-e2e-frontend.log 2>&1 &
          echo $! > /tmp/multica-e2e-frontend.pid

      - name: Wait for services
        run: |
          echo "Waiting for backend on :8080..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend ready (${i}x2s)"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/health || { echo "ERROR: backend did not start"; cat /tmp/multica-e2e-backend.log; exit 1; }

          echo "Waiting for frontend on :3000..."
          for i in $(seq 1 120); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready (${i}x2s)"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:3000 > /dev/null 2>&1 || { echo "ERROR: frontend did not start"; cat /tmp/multica-e2e-frontend.log; exit 1; }

      - name: Run E2E tests
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          timeout_minutes: 15
          command: pnpm exec playwright test
          on_retry_command: |
            echo "=== E2E attempt failed, retrying... ==="
            curl -sf http://localhost:8080/health || { echo "Backend down, restarting..."; (cd server && nohup go run ./cmd/server > /tmp/multica-e2e-backend.log 2>&1 &); }
            curl -sf http://localhost:3000 || { echo "Frontend down, restarting..."; (nohup pnpm dev:web > /tmp/multica-e2e-frontend.log 2>&1 &); }
            sleep 5

      - name: Upload E2E logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            /tmp/multica-e2e-backend.log
            /tmp/multica-e2e-frontend.log
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Report duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          DURATION=$((END - START))
          echo "::notice::e2e duration: ${DURATION}s"
          echo "⏱️ CI job duration: ${DURATION}s"

  # ---------------------------------------------------------------- #
  # All: aggregate summary job for branch protection.                #
  # Always runs; passes when every executed job passed or was        #
  # skipped by path filters, fails if any job failed/cancelled.      #
  # ---------------------------------------------------------------- #
  all:
    needs: [changes, frontend, backend-lint, backend-test, backend-contract, installer, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          echo "Job results:"
          echo "  changes:          ${{ needs.changes.result }}"
          echo "  frontend:         ${{ needs.frontend.result }}"
          echo "  backend-lint:     ${{ needs.backend-lint.result }}"
          echo "  backend-test:     ${{ needs.backend-test.result }}"
          echo "  backend-contract: ${{ needs.backend-contract.result }}"
          echo "  installer:        ${{ needs.installer.result }}"
          echo "  e2e:              ${{ needs.e2e.result }}"
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "✓ All CI checks passed (or were skipped by path filter)"
