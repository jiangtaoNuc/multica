name: Deploy to ECS

# 触发：
#   1) workflow_run — CI workflow 在 main 上跑完后自动跑（仅 conclusion=success 才真正部署）
#   2) workflow_dispatch — 手动兜底（可选指定 sha）
# 注意：workflow_run 无论 CI 成败都会触发本 workflow，必须在 jobs.if 里再卡一道
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy (default: HEAD of main)'
        required: false
        default: ''

concurrency:
  group: deploy-ecs-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 失败/取消的 CI 直接不部署；手动触发不受 CI 状态约束
    if: >
      ${{ github.event_name == 'workflow_dispatch'
          || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER }}
      ECS_SSH_KEY_B64: ${{ secrets.ECS_SSH_KEY_B64 }}
    steps:
      - name: Resolve target SHA
        id: target
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.sha }}" ]; then
            SHA="${{ github.event.inputs.sha }}"
            REASON="workflow_dispatch input"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            REASON="workflow_run head_sha (CI run ${{ github.event.workflow_run.id }})"
          else
            SHA="${{ github.sha }}"
            REASON="github.sha fallback"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"
          echo "Reason: $REASON"

      - name: Checkout target SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}

      - name: Setup SSH key (from base64 secret)
        shell: bash
        run: |
          set +e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "$ECS_SSH_KEY_B64" ]; then
            echo "ERROR: ECS_SSH_KEY_B64 secret is empty" >&2
            exit 1
          fi
          echo "secret length (chars): $(printf %s "$ECS_SSH_KEY_B64" | wc -c)"
          echo "$ECS_SSH_KEY_B64" | tr -d '[:space:]' | base64 -d > ~/.ssh/deploy_key 2>/tmp/b64err
          B64EXIT=$?
          if [ $B64EXIT -ne 0 ]; then
            echo "ERROR: base64 -d failed with exit $B64EXIT"
            cat /tmp/b64err
            exit $B64EXIT
          fi
          chmod 600 ~/.ssh/deploy_key
          echo "byte count: $(wc -c < ~/.ssh/deploy_key)"
          echo "line count: $(wc -l < ~/.ssh/deploy_key)"
          ssh-keygen -l -f ~/.ssh/deploy_key
          KGEN=$?
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts
          exit $KGEN

      - name: Network reachability probe
        shell: bash
        run: |
          set +e
          echo "=== runner egress IP ==="
          curl -sS --max-time 5 https://api.ipify.org || echo "(failed to fetch egress)"
          echo ""
          echo "=== TCP connect to $ECS_HOST:22 ==="
          # nc -v -w timeout. -G is macOS-only; use -w on Ubuntu runner.
          nc -vz -w 8 "$ECS_HOST" 22
          NC_EXIT=$?
          echo "nc exit: $NC_EXIT"
          echo "=== bash /dev/tcp probe (verifies TCP handshake from bash) ==="
          (echo > /dev/tcp/$ECS_HOST/22) 2>&1
          echo "bash /dev/tcp exit: $?"
          echo "=== curl telnet (read SSH banner) ==="
          curl -sS --max-time 8 telnet://$ECS_HOST:22 < /dev/null 2>&1 | head -3
          echo "curl exit: $?"
          # do not exit non-zero here; let the SSH probe surface ssh -v output

      - name: SSH probe (verbose)
        shell: bash
        run: |
          # explicitly DO NOT set -e initially; we want full ssh -v even on failure
          ssh -vvv -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            -o ConnectTimeout=15 \
            -i ~/.ssh/deploy_key \
            "$ECS_USER@$ECS_HOST" \
            'echo connected_as_$(whoami)_on_$(hostname)'
          RC=$?
          echo "ssh exit: $RC"
          exit $RC

      - name: Run deploy
        shell: bash
        run: |
          set -e
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 \
            -i ~/.ssh/deploy_key \
            "$ECS_USER@$ECS_HOST" \
            "bash /root/deploy/multica-deploy.sh ${{ steps.target.outputs.sha }}"

      - name: Verify health from GitHub runner
        run: |
          set -e
          curl -fsS --max-time 10 "http://$ECS_HOST:8080/healthz"
          echo ""
          echo "backend ok"
          curl -fsS --max-time 10 -o /dev/null -w "frontend: %{http_code}\n" "http://$ECS_HOST:3000/"

      - name: Summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "- upstream CI run: \`${{ github.event.workflow_run.id }}\` (\`${{ github.event.workflow_run.conclusion }}\`)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- target sha: \`${{ steps.target.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- backend: http://$ECS_HOST:8080" >> $GITHUB_STEP_SUMMARY
          echo "- frontend: http://$ECS_HOST:3000" >> $GITHUB_STEP_SUMMARY

  # CI 失败/取消时显式记一笔，让 Actions 时间线一眼看出"为什么没部署"
  skipped-notice:
    runs-on: ubuntu-latest
    if: >
      ${{ github.event_name == 'workflow_run'
          && github.event.workflow_run.conclusion != 'success' }}
    steps:
      - name: Log skip
        run: |
          echo "## Deploy skipped" >> $GITHUB_STEP_SUMMARY
          echo "Upstream CI run \`${{ github.event.workflow_run.id }}\` conclusion = \`${{ github.event.workflow_run.conclusion }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Head SHA: \`${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "No deployment performed." >> $GITHUB_STEP_SUMMARY
