name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy (default: HEAD of main)'
        required: false
        default: ''

concurrency:
  group: deploy-ecs-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER }}
      ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target SHA
        id: target
        run: |
          if [ -n "${{ github.event.inputs.sha }}" ]; then
            SHA="${{ github.event.inputs.sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Setup SSH key
        shell: bash
        run: |
          set +e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$ECS_SSH_KEY" > ~/.ssh/deploy_key
          # Ensure trailing newline
          if [ "$(tail -c1 ~/.ssh/deploy_key | wc -c)" = "1" ]; then
            LAST=$(tail -c1 ~/.ssh/deploy_key)
            [ "$LAST" != "" ] && printf '\n' >> ~/.ssh/deploy_key
          else
            printf '\n' >> ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          echo "--- key file info ---"
          ls -la ~/.ssh/deploy_key
          echo "byte count: $(wc -c < ~/.ssh/deploy_key)"
          echo "line count: $(wc -l < ~/.ssh/deploy_key)"
          echo "first line: $(head -1 ~/.ssh/deploy_key)"
          echo "last line:  $(tail -1 ~/.ssh/deploy_key)"
          echo "--- parse test ---"
          ssh-keygen -l -f ~/.ssh/deploy_key
          KGEN=$?
          echo "ssh-keygen exit: $KGEN"
          echo "--- known_hosts ---"
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts 2>&1 | tail -3
          chmod 644 ~/.ssh/known_hosts
          ls -la ~/.ssh/known_hosts
          exit $KGEN

      - name: SSH probe
        shell: bash
        run: |
          ssh -v -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
              -i ~/.ssh/deploy_key \
              "$ECS_USER@$ECS_HOST" \
              'echo connected_as_$(whoami)_on_$(hostname)' 2>&1 | tail -50

      - name: Run deploy
        shell: bash
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
              -o ServerAliveInterval=30 \
              -i ~/.ssh/deploy_key \
              "$ECS_USER@$ECS_HOST" \
              "bash /root/deploy/multica-deploy.sh ${{ steps.target.outputs.sha }}"

      - name: Verify health from GitHub runner
        run: |
          set -e
          curl -fsS --max-time 10 "http://$ECS_HOST:8080/healthz"
          echo ""
          echo "backend ok"
          curl -fsS --max-time 10 -o /dev/null -w "frontend: %{http_code}\n" "http://$ECS_HOST:3000/"

      - name: Summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- target sha: \`${{ steps.target.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- backend: http://$ECS_HOST:8080" >> $GITHUB_STEP_SUMMARY
          echo "- frontend: http://$ECS_HOST:3000" >> $GITHUB_STEP_SUMMARY
