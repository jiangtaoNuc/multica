name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy (default: HEAD of main)'
        required: false
        default: ''

concurrency:
  group: deploy-ecs-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_USER: ${{ secrets.ECS_USER }}
      ECS_SSH_KEY_B64: ${{ secrets.ECS_SSH_KEY_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target SHA
        id: target
        run: |
          if [ -n "${{ github.event.inputs.sha }}" ]; then
            SHA="${{ github.event.inputs.sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Setup SSH key (from base64 secret)
        shell: bash
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -z "$ECS_SSH_KEY_B64" ]; then
            echo "ERROR: ECS_SSH_KEY_B64 secret is empty" >&2
            exit 1
          fi
          echo "$ECS_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "byte count: $(wc -c < ~/.ssh/deploy_key)"
          echo "line count: $(wc -l < ~/.ssh/deploy_key)"
          echo "fingerprint:"
          ssh-keygen -l -f ~/.ssh/deploy_key
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: SSH probe
        shell: bash
        run: |
          set -e
          ssh -v -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
              -i ~/.ssh/deploy_key \
              "$ECS_USER@$ECS_HOST" \
              'echo connected_as_$(whoami)_on_$(hostname)'

      - name: Run deploy
        shell: bash
        run: |
          set -e
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
              -o ServerAliveInterval=30 \
              -i ~/.ssh/deploy_key \
              "$ECS_USER@$ECS_HOST" \
              "bash /root/deploy/multica-deploy.sh ${{ steps.target.outputs.sha }}"

      - name: Verify health from GitHub runner
        run: |
          set -e
          curl -fsS --max-time 10 "http://$ECS_HOST:8080/healthz"
          echo ""
          echo "backend ok"
          curl -fsS --max-time 10 -o /dev/null -w "frontend: %{http_code}\n" "http://$ECS_HOST:3000/"

      - name: Summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- target sha: \`${{ steps.target.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- backend: http://$ECS_HOST:8080" >> $GITHUB_STEP_SUMMARY
          echo "- frontend: http://$ECS_HOST:3000" >> $GITHUB_STEP_SUMMARY
