name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy (default: HEAD of main)'
        required: false
        default: ''

concurrency:
  group: deploy-ecs-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve target SHA
        id: target
        run: |
          if [ -n "${{ github.event.inputs.sha }}" ]; then
            SHA="${{ github.event.inputs.sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying SHA: $SHA"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ECS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "key file:"
          ls -la ~/.ssh/deploy_key
          echo "key first line: $(head -1 ~/.ssh/deploy_key)"
          echo "key last line:  $(tail -1 ~/.ssh/deploy_key)"
          echo "key line count: $(wc -l < ~/.ssh/deploy_key)"
          echo "fingerprint:"
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "FAILED to parse key"

      - name: SSH probe
        run: |
          ssh -v -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
              -i ~/.ssh/deploy_key \
              ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
              'echo connected_as_$(whoami)_on_$(hostname)' 2>&1 | tail -40

      - name: Run deploy
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
              -o ServerAliveInterval=30 \
              -i ~/.ssh/deploy_key \
              ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
              "bash /root/deploy/multica-deploy.sh ${{ steps.target.outputs.sha }}"

      - name: Verify health from GitHub runner
        run: |
          set -e
          curl -fsS --max-time 10 http://${{ secrets.ECS_HOST }}:8080/healthz
          echo ""
          echo "backend ok"
          curl -fsS --max-time 10 -o /dev/null -w "frontend: %{http_code}\n" http://${{ secrets.ECS_HOST }}:3000/

      - name: Summary
        if: always()
        run: |
          echo "## Deploy summary" >> $GITHUB_STEP_SUMMARY
          echo "- target sha: \`${{ steps.target.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- backend: http://${{ secrets.ECS_HOST }}:8080" >> $GITHUB_STEP_SUMMARY
          echo "- frontend: http://${{ secrets.ECS_HOST }}:3000" >> $GITHUB_STEP_SUMMARY
